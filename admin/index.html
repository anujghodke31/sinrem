<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin Login · sinrem</title>
  <link rel="stylesheet" href="assets/css/admin-reset.css" />
  <link rel="stylesheet" href="assets/css/admin-variables.css" />
  <link rel="stylesheet" href="assets/css/admin-layout.css" />
  <link rel="stylesheet" href="assets/css/admin-forms.css" />
  <link rel="stylesheet" href="assets/css/admin-components.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-mark"></div>
        <span class="login-logo-text">sinrem admin</span>
      </div>

      <h1 class="login-heading">Sign in</h1>
      <p class="login-sub">Admin access only. Keep your credentials safe.</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="admin-username">Username</label>
          <input type="text" id="admin-username" name="username" autocomplete="username" placeholder="admin" required />
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" name="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="login-error" role="alert" aria-live="polite"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Sign In</button>
      </form>
    </div>
  </div>

  <script type="module" src="assets/js/admin-login.js"></script>
</body>
</html>
